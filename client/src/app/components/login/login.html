<div class="login-container" dir="rtl">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>התחברות</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>אימייל</mat-label>
          <input matInput formControlName="email" type="email" placeholder="user@example.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">אימייל הוא שדה חובה</mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">פורמט אימייל לא תקין</mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>סיסמה</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">סיסמה היא שדה חובה</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">סיסמה חייבת להכיל לפחות 8 תווים</mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('pattern')">סיסמה חייבת להכיל ספרה ואות גדולה</mat-error>
        </mat-form-field>

        <p class="error-message" *ngIf="errorMessage()">{{ errorMessage() }}</p>

        <button mat-raised-button color="primary" type="submit"
                [disabled]="loginForm.invalid || isLoading()" class="full-width">
          <mat-spinner diameter="20" *ngIf="isLoading()"></mat-spinner>
          <span *ngIf="!isLoading()">התחבר</span>
        </button>

      </form>
    </mat-card-content>
  </mat-card>
</div>
